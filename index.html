<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Robux for free</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <svg style="display: none;">
        <symbol id="robux-svg" viewBox="0 0 24 24">
            <polygon points="12 1, 21.5 6.5, 21.5 17.5, 12 23, 2.5 17.5, 2.5 6.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
            <rect x="9.5" y="9.5" width="5" height="5" fill="currentColor"/>
        </symbol>
    </svg>
    <div class="background-pattern"></div>
    
    <div class="container">
        <header>
            <h1>More Robux for<br>free</h1>
            <p>Get all <strong>Robux</strong> for free</p>
        </header>

        <section class="card username-card">
            <h2>Enter your username</h2>
            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <span class="label">Enter your username</span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="usernameInput" placeholder="Enter your username" autocomplete="off">
                <div class="avatar-preview" id="avatarPreview" style="display: none;">
                    <img src="" alt="Avatar" id="avatarImage">
                    <span id="avatarName"></span>
                </div>
            </div>
        </section>

        <section class="card packages-card">
            <div class="package">
                <div class="package-info">
                    <svg class="robux-icon"><use href="#robux-svg"></use></svg>
                    <span class="amount">24,000</span>
                    <span class="old-amount"><svg class="robux-icon" style="width: 16px; height: 16px; margin-right: 4px;"><use href="#robux-svg"></use></svg> 22,500</span>
                </div>
                <button class="claim-btn" onclick="claim(24000)">CLAIM</button>
            </div>
            <div class="package">
                <div class="package-info">
                    <svg class="robux-icon"><use href="#robux-svg"></use></svg>
                    <span class="amount">11,000</span>
                    <span class="old-amount"><svg class="robux-icon" style="width: 16px; height: 16px; margin-right: 4px;"><use href="#robux-svg"></use></svg> 10,000</span>
                </div>
                <button class="claim-btn" onclick="claim(11000)">CLAIM</button>
            </div>
            <div class="package">
                <div class="package-info">
                    <svg class="robux-icon"><use href="#robux-svg"></use></svg>
                    <span class="amount">5,250</span>
                    <span class="old-amount"><svg class="robux-icon" style="width: 16px; height: 16px; margin-right: 4px;"><use href="#robux-svg"></use></svg> 4,500</span>
                </div>
                <button class="claim-btn" onclick="claim(5250)">CLAIM</button>
            </div>
            <div class="package">
                <div class="package-info">
                    <svg class="robux-icon"><use href="#robux-svg"></use></svg>
                    <span class="amount">2,000</span>
                    <span class="old-amount"><svg class="robux-icon" style="width: 16px; height: 16px; margin-right: 4px;"><use href="#robux-svg"></use></svg> 1,700</span>
                </div>
                <button class="claim-btn" onclick="claim(2000)">CLAIM</button>
            </div>
        </section>


    </div>

    <!-- Modal for Loading Animation -->
    <div class="modal-overlay" id="loadingModal">
        <div class="modal-content">
            <div class="spinner" id="spinner"></div>
            <div class="success-icon" id="successIcon" style="display: none;">
                <i class="fa-solid fa-check-circle" style="color: #22c55e; font-size: 3rem; margin-bottom: 1rem;"></i>
            </div>
            <h3 id="loadingTitle">Connecting...</h3>
            <p id="loadingText">Searching for username...</p>
            <div class="progress-bar">
                <div class="progress" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <a href="profile.html" class="more-btn">More</a>
</body>
</html>
